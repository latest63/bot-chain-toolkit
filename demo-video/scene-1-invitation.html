<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scene 1 — The Invitation</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #08080e;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Outfit', sans-serif;
    overflow: hidden;
  }
  .frame {
    width: 1920px;
    height: 1080px;
    position: relative;
    background: radial-gradient(ellipse at 50% 40%, #0d0d1a 0%, #08080e 60%);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }
  /* Grid overlay */
  .grid {
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,212,170,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,212,170,0.03) 1px, transparent 1px);
    background-size: 60px 60px;
  }
  /* Floating particles */
  .particle { position: absolute; border-radius: 50%; background: #00D4AA; opacity: 0.15; }
  .p1 { width: 4px; height: 4px; top: 15%; left: 20%; animation: float 8s infinite ease-in-out; }
  .p2 { width: 3px; height: 3px; top: 30%; left: 70%; animation: float 6s infinite ease-in-out reverse; }
  .p3 { width: 5px; height: 5px; top: 55%; left: 25%; animation: float 10s infinite ease-in-out; }
  .p4 { width: 2px; height: 2px; top: 70%; left: 80%; animation: float 7s infinite ease-in-out reverse; }
  .p5 { width: 4px; height: 4px; top: 80%; left: 40%; animation: float 9s infinite ease-in-out; }
  .p6 { width: 3px; height: 3px; top: 20%; left: 50%; animation: float 11s infinite ease-in-out; }
  .p7 { width: 2px; height: 2px; top: 60%; left: 60%; animation: float 5s infinite ease-in-out reverse; }
  .p8 { width: 5px; height: 5px; top: 45%; left: 85%; animation: float 12s infinite ease-in-out; }

  @keyframes float {
    0%, 100% { transform: translateY(0) scale(1); opacity: 0.15; }
    50% { transform: translateY(-30px) scale(1.5); opacity: 0.3; }
  }

  /* Brand pulse ring */
  .pulse-ring {
    position: absolute;
    width: 160px;
    height: 160px;
    border-radius: 50%;
    border: 1px solid rgba(0,212,170,0.1);
    animation: pulse 3s ease-out infinite;
    top: 32%;
  }
  .pulse-ring:nth-child(2) { animation-delay: 1s; }
  .pulse-ring:nth-child(3) { animation-delay: 2s; }

  @keyframes pulse {
    0% { transform: scale(0.5); opacity: 0.8; }
    100% { transform: scale(2.5); opacity: 0; }
  }

  /* Logo */
  .logo-wrapper {
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 40px;
  }
  .logo-icon {
    width: 72px;
    height: 72px;
    background: rgba(0,212,170,0.08);
    border: 1.5px solid rgba(0,212,170,0.25);
    border-radius: 18px;
    display: flex;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(8px);
  }
  .logo-icon svg { width: 40px; height: 40px; }

  /* Text */
  .title-line {
    font-size: 18px;
    letter-spacing: 8px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.3);
    font-weight: 400;
    margin-bottom: 12px;
  }
  .title-main {
    font-size: 72px;
    font-weight: 800;
    color: #fff;
    letter-spacing: -2px;
    line-height: 1.1;
    text-align: center;
  }
  .title-main span {
    background: linear-gradient(135deg, #00D4AA 0%, #00FFD0 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .subtitle {
    font-size: 22px;
    color: rgba(255,255,255,0.5);
    font-weight: 300;
    margin-top: 20px;
    letter-spacing: 0.5px;
    font-family: 'Inter', sans-serif;
  }

  /* Divider */
  .divider {
    width: 80px;
    height: 2px;
    background: linear-gradient(90deg, transparent, #00D4AA, transparent);
    margin: 30px 0;
    opacity: 0.6;
  }

  /* Bottom text */
  .bottom-tag {
    position: absolute;
    bottom: 60px;
    font-size: 14px;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.15);
    font-weight: 300;
  }
  .bottom-tag strong { color: rgba(0,212,170,0.5); font-weight: 600; }

  /* Corner accents */
  .corner { position: absolute; width: 60px; height: 60px; opacity: 0.15; }
  .corner-tl { top: 40px; left: 40px; border-top: 1px solid #00D4AA; border-left: 1px solid #00D4AA; }
  .corner-tr { top: 40px; right: 40px; border-top: 1px solid #00D4AA; border-right: 1px solid #00D4AA; }
  .corner-bl { bottom: 40px; left: 40px; border-bottom: 1px solid #00D4AA; border-left: 1px solid #00D4AA; }
  .corner-br { bottom: 40px; right: 40px; border-bottom: 1px solid #00D4AA; border-right: 1px solid #00D4AA; }
</style>
</head>
<body>
<div class="frame">
  <div class="grid"></div>
  <div class="particle p1"></div>
  <div class="particle p2"></div>
  <div class="particle p3"></div>
  <div class="particle p4"></div>
  <div class="particle p5"></div>
  <div class="particle p6"></div>
  <div class="particle p7"></div>
  <div class="particle p8"></div>

  <div class="corner corner-tl"></div>
  <div class="corner corner-tr"></div>
  <div class="corner corner-bl"></div>
  <div class="corner corner-br"></div>

  <div class="pulse-ring"></div>
  <div class="pulse-ring"></div>
  <div class="pulse-ring"></div>

  <div class="logo-wrapper">
    <div class="logo-icon">
      <svg viewBox="0 0 24 24" fill="none">
        <circle cx="12" cy="12" r="10" stroke="#00D4AA" stroke-width="2" fill="none"/>
        <circle cx="12" cy="12" r="4" fill="#00D4AA"/>
        <path d="M12 2v4M12 18v4M2 12h4M18 12h4" stroke="#00D4AA" stroke-width="2" stroke-linecap="round"/>
      </svg>
    </div>
  </div>

  <div class="title-line">BOT Chain</div>
  <h1 class="title-main">
    Communities Are<br>
    <span>Arriving</span>
  </h1>
  <div class="divider"></div>
  <p class="subtitle">They need tools to grow. We built them.</p>

  <div class="bottom-tag"><strong>✦</strong> &nbsp; BOT CHAIN TOOLKIT &nbsp; <strong>✦</strong></div>
</div>
</body>
</html>
